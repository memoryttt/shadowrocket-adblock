name: merge-adblock

on:
  schedule:
    # 每天 19:17 UTC（北京时间 03:17），避开整点 GitHub Actions 拥堵
    - cron: "17 19 * * *"
  workflow_dispatch: {}
  push:
    paths:
      - merge.py
      - sources.txt
      - .github/workflows/merge.yml

permissions:
  contents: write

concurrency:
  group: merge-adblock
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build + 安全校验
        id: build
        run: |
          set +e
          python3 merge.py
          echo "code=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: 提交（仅安全通过 exit 0）
        if: steps.build.outputs.code == '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/merged.sgmodule dist/manifest.json baseline.json
          if git diff --staged --quiet; then
            echo "无变化，跳过提交"
          else
            git commit -m "chore: auto-merge $(date -u +%Y-%m-%dT%H:%MZ)"
            # rebase + 重试，避免与并发提交竞态导致 non-fast-forward
            for i in 1 2 3; do
              git pull --rebase --autostash origin main && git push && exit 0
              echo "push 第 $i 次失败，重试…"; sleep 3
            done
            echo "push 多次失败"; exit 1
          fi

      - name: 邮件告警（检测到供应链/安全风险 exit 2）
        if: steps.build.outputs.code == '2'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "⚠️ shadowrocket-adblock 检测到供应链风险，已停止更新"
          to: cyg02032015@126.com
          from: shadowrocket-adblock bot <${{ secrets.MAIL_USERNAME }}>
          body: |
            自动合并在安全校验阶段检测到风险，已【停止更新】并保留上一版良品（未发布被投毒内容）。

            请人工核查上游模块/远程脚本是否被篡改：
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            详细风险清单见附件 security-report.txt。
          attachments: security-report.txt

      - name: 标红 job（任何非 0 退出）
        if: steps.build.outputs.code != '0'
        run: |
          echo "merge.py 退出码=${{ steps.build.outputs.code }}（2=安全风险停更，1=运行错误）"
          exit 1
